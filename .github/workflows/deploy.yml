name: Deploy

on:
  push:
    branches:
      - main
      - ripWalletCalcPage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Fuerza Node 24 en todas las actions

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install packages
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@v4  # ✅ Actualizado de v3 a v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          enable_jekyll: false
          cname: ripwallet.co